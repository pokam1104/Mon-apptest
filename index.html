<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>mon-apptest | Gestion de magasin</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #111827;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar li {
      margin: 15px 0;
      cursor: pointer;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    ul {
      padding: 0;
      list-style: none;
    }

    li {
      background: #f9fafb;
      margin: 8px 0;
      padding: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
    }

    .stats {
      display: flex;
      gap: 10px;
    }

    .stat-box {
      flex: 1;
      background: #2563eb;
      color: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  🛒 Gestion de Magasin - mon-apptest
</header>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Menu</h2>
    <ul>
      <li>Dashboard</li>
      <li>Produits</li>
      <li>Ventes</li>
    </ul>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Stats -->
    <div class="stats">
      <div class="stat-box">
        <h3 id="totalProduits">0</h3>
        <p>Produits</p>
      </div>

      <div class="stat-box">
        <h3 id="valeurStock">0</h3>
        <p>Valeur Stock</p>
      </div>
    </div>

    <!-- Formulaire -->
    <div class="card">
      <h2>Ajouter un produit</h2>

      <input id="nom" placeholder="Nom produit">
      <input id="prix" type="number" placeholder="Prix">
      <input id="stock" type="number" placeholder="Stock">

      <button onclick="ajouterProduit()">Ajouter</button>
    </div>

    <!-- Liste -->
    <div class="card">
      <h2>Liste des produits</h2>
      <ul id="liste"></ul>
    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
